      - { title: "Realtime reference", url: "https://developers.openai.com/api/reference/resources/realtime" }
      - { title: "Evals reference", url: "https://developers.openai.com/api/reference/resources/evals" }
      - { title: "Fine-tuning reference", url: "https://developers.openai.com/api/reference/resources/fine_tuning" }
